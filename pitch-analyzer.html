<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pitch & Rhythm Analyzer</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;background:#050508;color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px;font-family:'Courier New',monospace;user-select:none;
    position:relative;overflow:hidden;
  }
  body::after{
    content:'';position:fixed;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
    z-index:10;
  }
  #header{letter-spacing:.5em;font-size:10px;color:#334155;margin-bottom:28px;text-transform:uppercase}
  #waveWrap{width:260px;height:48px;margin-bottom:20px;border:1px solid #0f172a;border-radius:4px;background:#07070d;overflow:hidden}
  #waveWrap svg{display:block}
  #noteDisplay{text-align:center;min-height:110px;margin-bottom:4px}
  #noteName{font-size:100px;font-weight:900;line-height:1;color:#1e293b;letter-spacing:-.04em;transition:color .1s,text-shadow .1s}
  #noteOct{font-size:44px;color:#334155;vertical-align:super;font-weight:400}
  #noteInfo{color:#334155;font-size:12px;margin-top:2px;letter-spacing:.15em}
  #tunerSvg{margin-bottom:8px}
  #volBar{width:260px;height:3px;background:#0d1117;border-radius:2px;overflow:hidden;margin-bottom:20px}
  #volFill{height:100%;border-radius:2px;background:linear-gradient(to right,#1d4ed8,#7c3aed);width:0%;transition:width .04s}
  #bottomRow{display:flex;gap:12px;margin-bottom:24px;align-items:stretch}
  #bpmBox{background:#07070d;border:1px solid #0d1117;border-radius:10px;padding:10px 24px;text-align:center;min-width:110px}
  #bpmLabel{font-size:9px;color:#1e293b;letter-spacing:.3em;margin-bottom:4px}
  #bpmVal{font-size:38px;font-weight:900;color:#1e293b;letter-spacing:-.03em}
  #bpmSub{font-size:8px;color:#1e3a5f;margin-top:2px;letter-spacing:.2em}
  #tapCol{display:flex;flex-direction:column;gap:6px}
  .tapBtn{flex:1;background:#07070d;border:1px solid #1e293b;border-radius:8px;padding:0 18px;color:#475569;font-size:11px;cursor:pointer;letter-spacing:.2em;font-family:'Courier New',monospace;transition:all .1s}
  .tapBtn:active{background:#0f172a}
  #resetBtn{border-color:#0d1117!important;color:#1e293b!important;font-size:9px!important}
  #historyStrip{width:260px;height:22px;display:flex;align-items:center;gap:3px;margin-bottom:20px;overflow:hidden}
  #histLabel{font-size:9px;color:#1e293b;letter-spacing:.2em}
  #startBtn{padding:11px 44px;border-radius:40px;border:1px solid #334155;background:#0d1117;color:#94a3b8;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.3em;font-family:'Courier New',monospace;transition:all .2s}
  #startBtn.on{border-color:#7f1d1d;background:#1c0a0a;color:#f87171}
  #status{color:#1e293b;font-size:10px;margin-top:12px;letter-spacing:.2em;min-height:16px}
</style>
</head>
<body>

<div id="header">◈ PITCH &amp; RHYTHM ANALYZER ◈</div>

<div id="waveWrap">
  <svg id="waveSvg" width="260" height="48">
    <line x1="0" y1="24" x2="260" y2="24" stroke="#0f172a" stroke-width="1"/>
    <path id="wavePath" fill="none" stroke="#0f172a" stroke-width="1.5"/>
  </svg>
</div>

<div id="noteDisplay">
  <div id="noteName">—<span id="noteOct"></span></div>
  <div id="noteInfo">&nbsp;</div>
</div>

<svg id="tunerSvg" width="260" height="130" viewBox="0 0 260 130">
  <!-- bg arc -->
  <path d="M 22 120 A 108 108 0 0 1 238 120" fill="none" stroke="#07070d" stroke-width="16"/>
  <path d="M 30 120 A 100 100 0 0 1 230 120" fill="none" stroke="#0d1117" stroke-width="6"/>
  <!-- center zone -->
  <path d="M 116 20 A 100 100 0 0 1 144 20" fill="none" stroke="#4ade80" stroke-width="5" opacity="0.15"/>
  <!-- ticks -->
  <line id="t-50" x1="0" y1="0" x2="0" y2="0" stroke="#1e293b" stroke-width="1"/>
  <line id="t-25" x1="0" y1="0" x2="0" y2="0" stroke="#1e293b" stroke-width="1"/>
  <line id="t0"   x1="0" y1="0" x2="0" y2="0" stroke="#4ade80" stroke-width="2"/>
  <line id="t25"  x1="0" y1="0" x2="0" y2="0" stroke="#1e293b" stroke-width="1"/>
  <line id="t50"  x1="0" y1="0" x2="0" y2="0" stroke="#1e293b" stroke-width="1"/>
  <!-- labels -->
  <text id="lbFlat"  text-anchor="middle" dominant-baseline="middle" fill="#1e293b" font-size="10" font-family="serif">♭</text>
  <text id="lbNat"   text-anchor="middle" dominant-baseline="middle" fill="#334155" font-size="10" font-family="serif">♮</text>
  <text id="lbSharp" text-anchor="middle" dominant-baseline="middle" fill="#1e293b" font-size="10" font-family="serif">♯</text>
  <!-- needle -->
  <line id="needle" x1="130" y1="120" x2="130" y2="20" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <!-- center dot -->
  <circle cx="130" cy="120" r="6" fill="#050508" stroke="#1e293b" stroke-width="2" id="centerDot"/>
  <circle cx="130" cy="120" r="2" fill="#1e293b" id="centerDot2"/>
</svg>

<div id="volBar"><div id="volFill"></div></div>

<div id="bottomRow">
  <div id="bpmBox">
    <div id="bpmLabel">TEMPO</div>
    <div id="bpmVal">—</div>
    <div id="bpmSub">BPM</div>
  </div>
  <div id="tapCol">
    <button class="tapBtn" id="tapBtn">TAP</button>
    <button class="tapBtn" id="resetBtn">RESET</button>
  </div>
</div>

<div id="historyStrip"><div id="histLabel">PITCH HISTORY</div></div>

<button id="startBtn">● &nbsp;START</button>
<div id="status"></div>

<script>
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const CX=130,CY=120,R=100;

// Pre-calculate tick positions
(function(){
  const ticks = [-50,-25,0,25,50];
  const ids = ['t-50','t-25','t0','t25','t50'];
  ticks.forEach((v,i)=>{
    const a=((v/50)*55-90)*Math.PI/180;
    const el=document.getElementById(ids[i]);
    el.setAttribute('x1', CX+88*Math.cos(a));
    el.setAttribute('y1', CY+88*Math.sin(a));
    el.setAttribute('x2', CX+103*Math.cos(a));
    el.setAttribute('y2', CY+103*Math.sin(a));
  });
  [[-50,'lbFlat'],[0,'lbNat'],[50,'lbSharp']].forEach(([v,id])=>{
    const a=((v/50)*55-90)*Math.PI/180;
    const el=document.getElementById(id);
    el.setAttribute('x', CX+78*Math.cos(a));
    el.setAttribute('y', CY+78*Math.sin(a));
  });
})();

function autoCorrelate(buf, sr){
  const N=buf.length;
  let rms=0;
  for(let i=0;i<N;i++) rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/N);
  if(rms<0.015) return -1;
  let s=0,e=N-1;
  for(let i=0;i<N/2;i++){if(Math.abs(buf[i])<0.2){s=i;break;}}
  for(let i=1;i<N/2;i++){if(Math.abs(buf[N-i])<0.2){e=N-i;break;}}
  const b=buf.slice(s,e);
  const M=b.length;
  if(M<20) return -1;
  const c=new Float32Array(M);
  for(let i=0;i<M;i++) for(let j=0;j<M-i;j++) c[i]+=b[j]*b[j+i];
  let d=0;
  while(d<M-1&&c[d]>c[d+1])d++;
  let maxV=-1,maxP=-1;
  for(let i=d;i<M;i++) if(c[i]>maxV){maxV=c[i];maxP=i;}
  if(maxP<=0) return -1;
  if(maxP<M-1){
    const a=(c[maxP-1]+c[maxP+1]-2*c[maxP])/2;
    const bv=(c[maxP+1]-c[maxP-1])/2;
    const T0=a?maxP-bv/(2*a):maxP;
    return sr/T0;
  }
  return sr/maxP;
}

function toNote(freq){
  if(!freq||freq<20||freq>5000) return null;
  const st=12*Math.log2(freq/440);
  const r=Math.round(st);
  const idx=((r%12)+21)%12;
  const oct=Math.floor((r+57)/12);
  const cents=Math.round((st-r)*100);
  return{name:NOTES[idx],oct,cents,hz:parseFloat(freq.toFixed(1))};
}

function setNeedle(cents, noteColor){
  const cl=Math.max(-50,Math.min(50,cents));
  const angle=(cl/50)*55;
  const a=(angle-90)*Math.PI/180;
  const nx=CX+R*Math.cos(a), ny=CY+R*Math.sin(a);
  const needle=document.getElementById('needle');
  needle.setAttribute('x2',nx); needle.setAttribute('y2',ny);
  needle.setAttribute('stroke',noteColor);
  needle.style.filter=`drop-shadow(0 0 6px ${noteColor})`;
  document.getElementById('centerDot').setAttribute('stroke',noteColor);
  document.getElementById('centerDot2').setAttribute('fill',noteColor);
}

// State
let audioCtx=null, analyser=null, stream=null, raf=null;
let on=false, prevEng=0, prevOnsetTime=0;
let onsetTimes=[], history=[];
let tapTimes=[], tapBpm=null, autoBpm=null;

// DOM refs
const noteName=document.getElementById('noteName');
const noteOctEl=document.getElementById('noteOct');
const noteInfo=document.getElementById('noteInfo');
const wavePath=document.getElementById('wavePath');
const volFill=document.getElementById('volFill');
const bpmVal=document.getElementById('bpmVal');
const bpmSub=document.getElementById('bpmSub');
const historyStrip=document.getElementById('historyStrip');
const startBtn=document.getElementById('startBtn');
const statusEl=document.getElementById('status');

function updateHistory(n){
  history.push({name:n.name+n.oct, cents:n.cents});
  if(history.length>60) history.shift();
  historyStrip.innerHTML='';
  const show=history.slice(-20);
  show.forEach((h,i)=>{
    const d=document.createElement('div');
    d.style.cssText=`width:10px;height:10px;border-radius:2px;flex-shrink:0;
      background:${Math.abs(h.cents)<10?'#166534':Math.abs(h.cents)<25?'#713f12':'#7f1d1d'};
      opacity:${0.4+(i/20)*0.6}`;
    d.title=`${h.name} ${h.cents>0?'+':''}${h.cents}¢`;
    historyStrip.appendChild(d);
  });
}

function loop(){
  if(!analyser||!audioCtx){return;}
  const buf=new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);

  // Waveform
  const wW=260,wH=48,step=Math.floor(buf.length/128);
  let d='';
  for(let i=0;i<128;i++){
    const x=(i/127)*wW;
    const y=wH/2-buf[i*step]*(wH/2)*0.9;
    d+=(i===0?'M ':'L ')+x.toFixed(1)+' '+y.toFixed(1)+' ';
  }
  wavePath.setAttribute('d',d);

  // Volume
  let s=0;
  for(let i=0;i<buf.length;i++) s+=buf[i]*buf[i];
  const rms=Math.sqrt(s/buf.length);
  volFill.style.width=Math.min(rms*5,1)*100+'%';

  // Onset
  const now=performance.now();
  const thr=prevEng*1.6+0.02;
  if(rms>thr&&now-prevOnsetTime>180){
    prevOnsetTime=now;
    onsetTimes.push(now);
    if(onsetTimes.length>16) onsetTimes.shift();
    if(onsetTimes.length>=4){
      const ivls=onsetTimes.slice(1).map((t,i)=>t-onsetTimes[i]);
      const sorted=[...ivls].sort((a,b)=>a-b);
      const med=sorted[Math.floor(sorted.length/2)];
      const filtered=ivls.filter(x=>x>med*0.6&&x<med*1.4);
      if(filtered.length>=2){
        const avg=filtered.reduce((a,b)=>a+b,0)/filtered.length;
        if(avg>200&&avg<2000){
          autoBpm=Math.round(60000/avg);
          if(!tapBpm){
            bpmVal.style.color='#e2e8f0';
            bpmVal.textContent=autoBpm;
            bpmSub.textContent='AUTO';
            bpmSub.style.color='#1e3a5f';
          }
        }
      }
    }
  }
  prevEng=rms*0.4+prevEng*0.6;

  // Pitch
  const freq=autoCorrelate(buf,audioCtx.sampleRate);
  const n=freq>0?toNote(freq):null;

  if(n){
    const inTune=Math.abs(n.cents)<10;
    const col=inTune?'#4ade80':'#fbbf24';
    noteName.style.color=col;
    noteName.style.textShadow=inTune?'0 0 40px #4ade8066':'0 0 30px #fbbf2444';
    noteName.childNodes[0].textContent=n.name;
    noteOctEl.textContent=n.oct;
    noteInfo.innerHTML=`${n.hz} Hz &nbsp;·&nbsp; <span style="color:${col}">${n.cents>0?'+':''}${n.cents}¢</span>${inTune?' <span style="color:#4ade80">✓ IN TUNE</span>':''}`;
    setNeedle(n.cents,col);
    wavePath.setAttribute('stroke',col);
    updateHistory(n);
    statusEl.textContent='';
  } else {
    noteName.style.color='#1e293b';
    noteName.style.textShadow='none';
    noteName.childNodes[0].textContent='—';
    noteOctEl.textContent='';
    noteInfo.innerHTML='&nbsp;';
    setNeedle(0,'#1e293b');
    wavePath.setAttribute('stroke',on?'#1e3a5f':'#0f172a');
    if(on) statusEl.textContent='WAITING FOR SIGNAL...';
  }

  raf=requestAnimationFrame(loop);
}

async function start(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=2048;
    analyser.smoothingTimeConstant=0;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    on=true;
    startBtn.textContent='■  STOP';
    startBtn.classList.add('on');
    raf=requestAnimationFrame(loop);
  }catch(e){
    alert('需要麦克风权限 🎤');
  }
}

function stop(){
  cancelAnimationFrame(raf);
  stream&&stream.getTracks().forEach(t=>t.stop());
  audioCtx&&audioCtx.close();
  audioCtx=null; analyser=null; stream=null;
  on=false; prevEng=0; onsetTimes=[]; history=[];
  autoBpm=null;
  startBtn.textContent='●  START';
  startBtn.classList.remove('on');
  noteName.style.color='#1e293b';
  noteName.style.textShadow='none';
  noteName.childNodes[0].textContent='—';
  noteOctEl.textContent='';
  noteInfo.innerHTML='&nbsp;';
  volFill.style.width='0%';
  bpmVal.textContent='—'; bpmVal.style.color='#1e293b';
  bpmSub.textContent='BPM'; bpmSub.style.color='#1e3a5f';
  wavePath.setAttribute('d','');
  setNeedle(0,'#1e293b');
  historyStrip.innerHTML='<div id="histLabel" style="font-size:9px;color:#1e293b;letter-spacing:.2em">PITCH HISTORY</div>';
  statusEl.textContent='';
}

startBtn.addEventListener('click',()=>on?stop():start());

// Tap tempo
document.getElementById('tapBtn').addEventListener('click',()=>{
  const now=Date.now();
  tapTimes=tapTimes.filter(t=>now-t<5000);
  tapTimes.push(now);
  if(tapTimes.length>=2){
    const ivls=tapTimes.slice(1).map((t,i)=>t-tapTimes[i]);
    const avg=ivls.reduce((a,b)=>a+b,0)/ivls.length;
    tapBpm=Math.round(60000/avg);
    bpmVal.textContent=tapBpm; bpmVal.style.color='#e2e8f0';
    bpmSub.textContent='TAP'; bpmSub.style.color='#4ade80';
    document.getElementById('bpmBox').style.borderColor='#1e293b';
  }
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  tapBpm=null; tapTimes=[];
  if(autoBpm){
    bpmVal.textContent=autoBpm; bpmSub.textContent='AUTO'; bpmSub.style.color='#1e3a5f';
  } else {
    bpmVal.textContent='—'; bpmVal.style.color='#1e293b';
    bpmSub.textContent='BPM'; bpmSub.style.color='#1e3a5f';
    document.getElementById('bpmBox').style.borderColor='#0d1117';
  }
});
</script>
</body>
</html>
